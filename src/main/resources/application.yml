spring:
  mvc:
    async:
      request-timeout: 180000
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.session.RedisSessionAutoConfiguration
      - org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration
      - org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
  application:
    name: gate-mock-exam
  ai:
    vectorstore:
      pgvector:
        dimension: 768
        distance-type: COSINE_DISTANCE
        table-name: gate_vector_store
        initialize-schema: true
  datasource:
    url: jdbc:postgresql://db.xvhlrxrrbijyeijqiglp.supabase.co:5432/postgres?sslmode=require
    username: postgres
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false                # disable during development
  security:
    user:
      name: admin               # temporary, replaced by DB users

server:
  port: 8085
  servlet:
    session:
      timeout: 30d

logging:
  level:
    root: INFO
    com.gate: DEBUG
    org.springframework.web.client: DEBUG
    org.springframework.http.converter: DEBUG

# ─── Gemini AI (used ONLY for AI Enrichment Pipeline workers) ──────────────
gemini:
  api:
    key: ${GEMINI_API_KEY}
  quota:
    daily-token-limit: 500000
    warn-threshold: 400000
  model:
    generation: gemini-3.5-flash
    solve: gemini-3.5-flash           # v2.1 multimodal solve+enrich model
    max-output-tokens:
      generation: 8192
    temperature:
      generation: 0.3
  confidence:
    threshold: 0.70                   # MCQ/MSQ auto-publish threshold
    nat-threshold: 0.85               # Stricter for NAT (numerical) questions

# ─── MinIO Object Storage ────────────────────────────────────────────────────
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: gate-assets

# ─── Pipeline 1: Python Extraction Microservice ──────────────────────────────
extraction:
  service:
    url: http://localhost:8090
    timeout-seconds: 120

# ─── v2.1 Pipeline Config ─────────────────────────────────────────────────────
pipeline:
  batch-size: 10                      # Questions per QualityReview Pass-2 batch
  crop-service-url: ${CROP_SERVICE_URL:}  # Render URL of lightweight Python crop service

# ─── Storage Cleanup Job ──────────────────────────────────────────────────────
cleanup:
  interval-ms: 3600000                # Run every hour
