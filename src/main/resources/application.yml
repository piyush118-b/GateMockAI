spring:
  application:
    name: gate-mock-exam
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}          # set in env or .env file
        project-id: gate-mock-exam-project  # required placeholder in Spring AI 1.1.1
        location: us-central1
        embedding:
          api-key: ${GEMINI_API_KEY}
          project-id: gate-mock-exam-project
          location: us-central1
          text:
            options:
              model: gemini-embedding-001          # Google's developer embedding model
        chat:
          options:
            model: gemini-2.0-flash            # wired in Phase 3
  datasource:
    url: jdbc:postgresql://localhost:5439/gate_db
    username: gate_user
    password: gate_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false                # disable during development
  security:
    user:
      name: admin               # temporary, replaced by DB users

server:
  port: 8085

logging:
  level:
    root: INFO
    com.gate: DEBUG

# Vector store persistence path
gate:
  rag:
    vector-store-path: ./data/vector-store.json
    seed-questions-path: classpath:rag/seed_questions.json
    auto-ingest-on-startup: true
