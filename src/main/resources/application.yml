spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
      - org.springframework.boot.autoconfigure.session.RedisSessionAutoConfiguration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always
  application:
    name: gate-mock-exam
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5-coder:7b
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      pgvector:
        dimension: 768
        distance-type: COSINE_DISTANCE
        table-name: gate_vector_store
        initialize-schema: true
  datasource:
    url: jdbc:postgresql://localhost:5432/gate_db
    username: gate_user
    password: gate_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema, Hibernate only validates
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false                # disable during development
  security:
    user:
      name: admin               # temporary, replaced by DB users

server:
  port: 8085
  servlet:
    session:
      timeout: 30d

logging:
  level:
    root: INFO
    com.gate: DEBUG

# Vector store persistence path
gate:
  rag:
    vector-store-path: ./data/vector-store.json
    seed-questions-path: classpath:rag/seed_questions.json
    auto-ingest-on-startup: true

# TRACK 3: HyDE + Multi-query fusion toggle.
# Set to false to fall back to bare single-topic cosine search.
hyde:
  enabled: true
