<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">
<head>
    <title th:text="${pageTitle} + ' | GATE MockAI'">Edit Paper | GATE MockAI</title>
</head>
<body>
<div th:fragment="content">
    <style>
        /* Premium Editor Style Injection */
        .editor-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-top: 3px solid var(--primary);
            border-radius: 16px;
            margin-bottom: 2.5rem;
            gap: 1.5rem;
            flex-wrap: wrap;
            box-shadow: var(--shadow-md);
        }
        .q-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-left: 6px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2.5rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .q-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .q-card.card-MCQ { border-left-color: var(--primary); }
        .q-card.card-MSQ { border-left-color: var(--success); }
        .q-card.card-NAT { border-left-color: var(--warning); }

        .q-card.dirty {
            border-color: var(--warning) !important;
            border-left-color: var(--warning) !important;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.15) !important;
        }
        .q-card.dirty .btn-save-q {
            background: var(--gradient-button) !important;
            color: #ffffff !important;
            border-color: transparent !important;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4) !important;
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.5); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        
        .q-header {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1.75rem;
            flex-wrap: wrap;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 1.25rem;
        }
        .q-seq {
            background: var(--gradient-primary);
            color: #ffffff;
            font-weight: 800;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.95rem;
            box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.3);
        }
        .q-type-badge {
            padding: 0.3rem 1rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .type-MCQ { background: rgba(99,102,241,0.12); color: var(--primary); }
        .type-MSQ { background: rgba(52,211,153,0.12); color: var(--success); }
        .type-NAT { background: rgba(251,191,36,0.12); color: var(--warning); }
        
        .field-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.6rem;
            margin-top: 1.75rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }
        .q-card > .field-label:first-of-type {
            margin-top: 0;
        }
        .edit-textarea {
            width: 100%;
            min-height: 110px;
            padding: 1rem 1.25rem;
            resize: vertical;
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.6;
            transition: all 0.25s ease;
        }
        .edit-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3.5px rgba(99, 102, 241, 0.15);
            background: rgba(var(--primary-rgb), 0.01);
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.25rem;
            margin-top: 1.25rem;
        }
        @media (max-width: 768px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
        .option-row {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 1.25rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .option-row:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }
        .option-row.correct-option {
            border-color: var(--success);
            border-left: 4px solid var(--success);
            background: rgba(52, 211, 153, 0.04);
            box-shadow: 0 4px 12px rgba(52, 211, 153, 0.04);
        }
        .option-row:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3.5px rgba(99, 102, 241, 0.15);
        }
        .option-label {
            font-weight: 800;
            color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
            transition: all 0.2s ease;
            border: 1px solid rgba(99, 102, 241, 0.15);
        }
        .option-row.correct-option .option-label {
            color: var(--success);
            background: rgba(52, 211, 153, 0.15);
            border-color: rgba(52, 211, 153, 0.3);
        }
        .option-text-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.925rem;
            line-height: 1.5;
            resize: vertical;
            min-height: 54px;
            outline: none;
            font-family: inherit;
            padding: 0.2rem 0;
            margin: 0;
        }
        .option-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            border-left: 1px solid var(--border-color);
            padding-left: 1rem;
            flex-shrink: 0;
        }
        .option-controls-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            user-select: none;
        }
        
        /* Custom Checkbox */
        .option-controls input[type="checkbox"] {
            -webkit-appearance: none;
            appearance: none;
            background-color: rgba(255, 255, 255, 0.03);
            margin: 0;
            font: inherit;
            color: var(--success);
            width: 1.35rem;
            height: 1.35rem;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            display: inline-grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }
        .option-controls input[type="checkbox"]::before {
            content: "";
            width: 0.65rem;
            height: 0.65rem;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            background-color: currentColor;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }
        .option-controls input[type="checkbox"]:checked {
            background-color: rgba(52, 211, 153, 0.15);
            border-color: var(--success);
            color: var(--success);
        }
        .option-controls input[type="checkbox"]:checked::before {
            transform: scale(1);
        }
        .option-controls input[type="checkbox"]:hover {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.12);
        }
        
        .opt-img-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            padding: 0;
            margin: 0;
            color: var(--text-secondary);
        }
        .opt-img-btn:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.08);
            color: var(--primary);
            transform: translateY(-1px);
        }
        .opt-img-btn img {
            max-height: 100%;
            max-width: 100%;
            border-radius: 6px;
            object-fit: cover;
        }
        
        .img-upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            padding: 1.75rem;
            text-align: center;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            background: var(--bg-base);
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.65rem;
        }
        .img-upload-zone:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.04);
            color: var(--text-primary);
        }
        .img-upload-zone img {
            max-height: 200px;
            max-width: 100%;
            border-radius: 8px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            margin-top: 0.5rem;
            transition: transform 0.25s;
        }
        .img-upload-zone img:hover {
            transform: scale(1.02);
        }
        
        .btn-save-q {
            font-size: 0.75rem !important;
            padding: 0.45rem 1rem !important;
            border-radius: 8px !important;
            font-weight: 700 !important;
            background: rgba(99, 102, 241, 0.08) !important;
            color: var(--primary) !important;
            border: 1px solid rgba(99, 102, 241, 0.25) !important;
            cursor: pointer;
            transition: all 0.2s ease !important;
        }
        .btn-save-q:hover {
            background: var(--primary) !important;
            color: #ffffff !important;
            border-color: var(--primary) !important;
            box-shadow: 0 4px 8px rgba(99, 102, 241, 0.15) !important;
        }
        .btn-delete-q {
            font-size: 0.75rem;
            padding: 0.45rem 1rem;
            background: rgba(239, 68, 68, 0.08);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-delete-q:hover {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
            box-shadow: 0 4px 8px rgba(239, 68, 68, 0.2);
        }
        .save-indicator {
            font-size: 0.75rem;
            color: var(--success);
            background: rgba(52, 211, 153, 0.12);
            padding: 0.3rem 0.85rem;
            border-radius: 9999px;
            font-weight: 700;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateY(5px);
            display: inline-block;
        }
        .save-indicator.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>

    <!-- Hidden CSRF Inputs for AJAX Header Generation -->
    <input type="hidden" id="csrfToken" th:value="${_csrf.token}"/>
    <input type="hidden" id="csrfHeader" th:value="${_csrf.headerName}"/>

    <!-- Toolbar -->
    <div class="editor-toolbar">
        <div style="display: flex; align-items: center; gap: 1.25rem;">
            <a th:href="@{/admin/tests/{id}(id=${test.id})}" class="btn btn-secondary"
               style="font-size: 0.85rem; padding: 0.5rem 0.85rem; border-radius: 8px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align: middle; margin-right: 2px;">
                    <polyline points="15 18 9 12 15 6"></polyline></svg> Back
            </a>
            <div style="width: 1px; height: 32px; background: var(--border-color);"></div>
            <div>
                <div style="font-size: 1.25rem; font-weight: 800; color: var(--text-primary); line-height: 1.2; margin-bottom: 0.2rem;"
                     th:text="${test.title}">Paper Title</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">
                    <span th:text="${test.questions.size()} + ' questions'"></span>
                    <span style="opacity: 0.5;">•</span>
                    <span th:text="${test.durationMinutes} + ' minutes'"></span>
                </div>
            </div>
        </div>
        <div style="display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center;">
            <button onclick="addNewQuestion()" class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.55rem 1rem; border-radius: 8px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right: 2px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Add Question
            </button>
            <a th:href="@{/admin/tests/{id}/export(id=${test.id})}" target="_blank"
               class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.55rem 1rem; border-radius: 8px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 2px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Export PDF
            </a>
            <a th:href="@{/admin/tests/{id}(id=${test.id})}"
               class="btn btn-primary" style="font-size: 0.85rem; padding: 0.55rem 1rem; border-radius: 8px;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right: 2px;"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Done Editing
            </a>
        </div>
    </div>

    <!-- Question Editor Cards -->
    <div id="questionsContainer">
        <div th:each="q, qStat : ${test.questions}" class="q-card"
             th:classappend="'card-' + ${q.type}"
             th:id="'q-card-' + ${q.id}" th:data-question-id="${q.id}">

            <div class="q-header">
                <div class="q-seq" th:text="${q.sequenceNo}">1</div>
                <span class="q-type-badge" th:classappend="'type-' + ${q.type}" th:text="${q.type}">MCQ</span>
                <span style="font-size: 0.8rem; color: var(--text-secondary); font-weight: 500;"
                      th:text="${q.marks} + ' marks | -' + ${q.negativeMarks} + ' neg'"></span>
                <span class="save-indicator" th:id="'saved-' + ${q.id}">✓ Saved</span>
                <div style="margin-left: auto; display: flex; gap: 0.5rem;">
                    <button class="btn btn-secondary btn-save-q"
                             onclick="saveQuestion(this.closest('.q-card').dataset.questionId)">Save</button>
                    <button onclick="deleteQuestion(this)" class="btn-delete-q"
                             th:data-question-id="${q.id}">Delete</button>
                </div>
            </div>

            <!-- Question Text -->
            <div class="field-label">Question Text</div>
            <textarea class="edit-textarea" th:id="'qt-' + ${q.id}"
                      onchange="markDirty(this.closest('.q-card').dataset.questionId)"
                      th:text="${q.questionText}"></textarea>

            <!-- Question Image Upload -->
            <div class="field-label">Question Image (optional)</div>
            <div class="img-upload-zone" th:id="'qimg-zone-' + ${q.id}"
                 onclick="triggerImageUpload('q', this.closest('.q-card').dataset.questionId)">
                <span th:if="${q.imagePath == null}" style="display: flex; flex-direction: column; align-items: center; gap: 0.5rem;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted);">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <span style="font-weight: 500;">Click to upload image or drag and drop</span>
                    <span style="font-size: 0.75rem; opacity: 0.6;">PNG, JPG, GIF up to 5MB</span>
                </span>
                <img th:if="${q.imagePath != null}" th:src="${q.imagePath}" alt="Question image" />
            </div>
            <input type="file" accept="image/*" style="display:none;"
                   th:id="'qimg-file-' + ${q.id}"
                   onchange="handleImageUpload(this, 'q', this.closest('.q-card').dataset.questionId)"/>

            <!-- Options (for MCQ / MSQ) -->
            <div th:if="${q.type.name() != 'NAT'}" class="options-grid">
                <div th:each="opt : ${q.options}"
                     class="option-row"
                     th:classappend="${opt.correct} ? ' correct-option' : ''"
                     th:id="'opt-' + ${opt.id}"
                     th:data-option-id="${opt.id}">
                    <div class="option-label" th:text="${opt.optionLabel}">A</div>
                    <textarea class="option-text-input" rows="2"
                              th:id="'ot-' + ${opt.id}"
                              onchange="saveOption(this.closest('.option-row').dataset.optionId, this.closest('.q-card').dataset.questionId)"
                              th:text="${opt.optionText}"></textarea>
                    
                    <div class="option-controls">
                        <span class="option-controls-label">Correct</span>
                        <input type="checkbox" th:checked="${opt.correct}"
                               th:id="'oc-' + ${opt.id}"
                               onchange="toggleCorrect(this.closest('.option-row').dataset.optionId, this.closest('.q-card').dataset.questionId)"/>
                        
                        <button class="opt-img-btn" th:id="'opt-img-btn-' + ${opt.id}"
                                onclick="triggerImageUpload('opt', this.closest('.option-row').dataset.optionId)">
                            <span th:if="${opt.imagePath == null}">
                                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                    <polyline points="21 15 16 10 5 21"></polyline>
                                </svg>
                            </span>
                            <img th:if="${opt.imagePath != null}" th:src="${opt.imagePath}"/>
                        </button>
                        <input type="file" accept="image/*" style="display:none;"
                               th:id="'optimg-file-' + ${opt.id}"
                               onchange="handleImageUpload(this, 'opt', this.closest('.option-row').dataset.optionId)"/>
                    </div>
                </div>
            </div>

            <!-- NAT answer field -->
            <div th:if="${q.type.name() == 'NAT'}">
                <div class="field-label">Correct NAT Value</div>
                <input type="number" step="0.01"
                       th:value="${q.correctNatValue}"
                       th:id="'nat-' + ${q.id}"
                       class="form-control" style="max-width: 240px;"
                       onchange="saveQuestion(this.closest('.q-card').dataset.questionId)"/>
            </div>

            <!-- Explanation -->
            <div class="field-label">Explanation / Derivation</div>
            <textarea class="edit-textarea" th:id="'exp-' + ${q.id}"
                      onchange="markDirty(this.closest('.q-card').dataset.questionId)"
                      th:text="${q.explanation}"></textarea>
        </div>
    </div>

    <script th:inline="javascript">
        const TEST_ID = /*[[${test.id}]]*/ '';

        function getHeaders() {
            const token = document.getElementById('csrfToken')?.value;
            const header = document.getElementById('csrfHeader')?.value;
            const headers = {'Content-Type': 'application/json'};
            if (token && header) {
                headers[header] = token;
            }
            return headers;
        }

        function markDirty(qId) {
            document.getElementById('q-card-' + qId).classList.add('dirty');
        }

        function saveQuestion(qId) {
            const questionText = document.getElementById('qt-' + qId)?.value?.trim();
            const explanation  = document.getElementById('exp-' + qId)?.value?.trim();
            const natEl = document.getElementById('nat-' + qId);
            const payload = { questionText, explanation };
            if (natEl) payload.correctNatValue = parseFloat(natEl.value);

            fetch(`/admin/tests/${TEST_ID}/questions/${qId}`, {
                method: 'PATCH',
                headers: getHeaders(),
                body: JSON.stringify(payload)
            }).then(r => {
                if (r.ok) {
                    const card = document.getElementById('q-card-' + qId);
                    card.classList.remove('dirty');
                    const indicator = document.getElementById('saved-' + qId);
                    indicator.classList.add('show');
                    setTimeout(() => indicator.classList.remove('show'), 2000);
                }
            });
        }

        function saveOption(optId, qId) {
            const text = document.getElementById('ot-' + optId)?.value?.trim();
            const isCorrect = document.getElementById('oc-' + optId)?.checked ?? false;
            fetch(`/admin/tests/${TEST_ID}/options/${optId}`, {
                method: 'PATCH',
                headers: getHeaders(),
                body: JSON.stringify({ optionText: text, isCorrect })
            });
        }

        function toggleCorrect(optId, qId) {
            saveOption(optId, qId);
            const row = document.getElementById('opt-' + optId);
            const checked = document.getElementById('oc-' + optId).checked;
            if (checked) row.classList.add('correct-option');
            else row.classList.remove('correct-option');
        }

        function triggerImageUpload(type, id) {
            const prefix = type === 'q' ? 'qimg-file-' : 'optimg-file-';
            document.getElementById(prefix + id)?.click();
        }

        function handleImageUpload(input, type, id) {
            if (!input.files?.length) return;
            const fd = new FormData();
            fd.append('file', input.files[0]);

            const token = document.getElementById('csrfToken')?.value;
            const header = document.getElementById('csrfHeader')?.value;
            const headers = {};
            if (token && header) {
                headers[header] = token;
            }

            fetch('/admin/upload/image', { 
                method: 'POST', 
                headers: headers,
                body: fd 
            })
                .then(r => r.json())
                .then(data => {
                    if (data.url) {
                        const endpoint = type === 'q'
                            ? `/admin/tests/${TEST_ID}/questions/${id}`
                            : `/admin/tests/${TEST_ID}/options/${id}`;
                        fetch(endpoint, {
                            method: 'PATCH',
                            headers: getHeaders(),
                            body: JSON.stringify({ imagePath: data.url })
                        }).then(() => {
                            const zoneId = type === 'q' ? 'qimg-zone-' + id : 'opt-img-btn-' + id;
                            const zone = document.getElementById(zoneId);
                            if (zone) {
                                let img = zone.querySelector('img') || document.createElement('img');
                                img.src = data.url;
                                if (type === 'q') {
                                    img.style.maxHeight = '180px';
                                } else {
                                    img.style.maxHeight = '100%';
                                }
                                zone.innerHTML = '';
                                zone.appendChild(img);
                            }
                        });
                    }
                });
        }

        function addNewQuestion() {
            fetch(`/admin/tests/${TEST_ID}/questions`, {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ questionText: 'New Question' })
            }).then(r => r.json()).then(data => {
                if (data.questionId) {
                    alert('New question added! Refreshing page...');
                    window.location.reload();
                }
            });
        }

        function deleteQuestion(btn) {
            const qId = btn.dataset.questionId;
            if (!confirm('Delete this question permanently?')) return;

            const token = document.getElementById('csrfToken')?.value;
            const header = document.getElementById('csrfHeader')?.value;
            const headers = {};
            if (token && header) {
                headers[header] = token;
            }

            fetch(`/admin/tests/${TEST_ID}/questions/${qId}`, { 
                method: 'DELETE',
                headers: headers
            })
                .then(r => {
                    if (r.ok) {
                        document.getElementById('q-card-' + qId)?.remove();
                    }
                });
        }
    </script>
</div>
</body>
</html>
