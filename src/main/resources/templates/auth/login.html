<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">
<head>
    <title>Login | GATE MockAI</title>
</head>
<body>
    <div th:fragment="content" class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white/60 backdrop-blur-2xl border border-white p-8 rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] relative overflow-hidden">
            
            <div class="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-indigo-500 via-purple-500 to-cyan-500"></div>
            
            <div class="text-center mb-8 mt-2">
                <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight mb-2">Welcome Back</h2>
                <p class="text-slate-500 font-medium">Sign in to your GATE MockAI account</p>
            </div>

            <!-- Feedback banners -->
            <div th:if="${param.error}" class="mb-6 p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 text-sm text-center font-medium shadow-sm">
                Invalid email or password. Please try again.
            </div>
            <div th:if="${param.logout}" class="mb-6 p-4 rounded-xl bg-green-50 border border-green-100 text-green-600 text-sm text-center font-medium shadow-sm">
                You have been successfully logged out.
            </div>
            <div th:if="${param.registered}" class="mb-6 p-4 rounded-xl bg-green-50 border border-green-100 text-green-600 text-sm text-center font-medium shadow-sm">
                Registration successful! Please login.
            </div>

            <form th:action="@{/login}" method="post" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Email Address</label>
                    <input type="email" id="username" name="username" class="w-full px-5 py-3.5 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 text-slate-900 placeholder-slate-400 transition-all outline-none shadow-sm font-medium" placeholder="name@domain.com" required autofocus>
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Password</label>
                    <input type="password" id="password" name="password" class="w-full px-5 py-3.5 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 text-slate-900 placeholder-slate-400 transition-all outline-none shadow-sm font-medium" placeholder="••••••••" required>
                </div>
                <div class="pt-2">
                    <button type="submit" class="w-full py-4 px-4 bg-gradient-to-r from-indigo-600 to-cyan-500 hover:from-indigo-700 hover:to-cyan-600 text-white font-bold rounded-2xl shadow-[0_10px_20px_-10px_rgba(79,70,229,0.5)] transform transition-all active:scale-[0.98]">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center text-sm font-medium text-slate-500">
                Don't have an account? 
                <a th:href="@{/register}" class="text-indigo-600 hover:text-indigo-700 hover:underline transition-colors ml-1">Register here</a>
            </div>
        </div>
    </div>
</body>
</html>
