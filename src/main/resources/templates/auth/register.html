<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::content})}">
<head>
    <title>Register | GATE MockAI</title>
</head>
<body>
    <div th:fragment="content" class="flex-grow flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white/60 backdrop-blur-2xl border border-white p-8 rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] relative overflow-hidden">
            
            <div class="absolute top-0 inset-x-0 h-1.5 bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-500"></div>
            
            <div class="text-center mb-8 mt-2">
                <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight mb-2">Create Account</h2>
                <p class="text-slate-500 font-medium">Join thousands of students preparing with AI</p>
            </div>

            <form th:action="@{/register}" th:object="${userDto}" method="post" class="space-y-4">
                <div>
                    <label for="fullName" class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Full Name</label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="w-full px-5 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-cyan-500/20 focus:border-cyan-500 text-slate-900 placeholder-slate-400 transition-all outline-none shadow-sm font-medium" placeholder="John Doe" required>
                    <div class="mt-1 ml-1 text-xs text-red-500 font-medium" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Email Address</label>
                    <input type="email" id="email" th:field="*{email}" class="w-full px-5 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-cyan-500/20 focus:border-cyan-500 text-slate-900 placeholder-slate-400 transition-all outline-none shadow-sm font-medium" placeholder="name@domain.com" required>
                    <div class="mt-1 ml-1 text-xs text-red-500 font-medium" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Password</label>
                    <input type="password" id="password" th:field="*{password}" class="w-full px-5 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-cyan-500/20 focus:border-cyan-500 text-slate-900 placeholder-slate-400 transition-all outline-none shadow-sm font-medium" placeholder="Min. 6 characters" required>
                    <div class="mt-1 ml-1 text-xs text-red-500 font-medium" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-semibold text-slate-700 mb-1.5 ml-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="w-full px-5 py-3 bg-white/80 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-cyan-500/20 focus:border-cyan-500 text-slate-900 placeholder-slate-400 transition-all outline-none shadow-sm font-medium" placeholder="••••••••" required>
                    <div class="mt-1 ml-1 text-xs text-red-500 font-medium" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <div class="pt-3">
                    <button type="submit" class="w-full py-4 px-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white font-bold rounded-2xl shadow-[0_10px_20px_-10px_rgba(6,182,212,0.5)] transform transition-all active:scale-[0.98]">
                        Register
                    </button>
                </div>
            </form>

            <div class="mt-8 text-center text-sm font-medium text-slate-500">
                Already have an account? 
                <a th:href="@{/login}" class="text-blue-600 hover:text-blue-700 hover:underline transition-colors ml-1">Sign in here</a>
            </div>
        </div>
    </div>
</body>
</html>
