version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gate_postgres
    environment:
      POSTGRES_DB: gate_db
      POSTGRES_USER: gate_user
      POSTGRES_PASSWORD: gate_pass
    ports:
      - "5439:5432"
    volumes:
      - gate_pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: gate_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  gate_pgdata:
