version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gate_postgres
    environment:
      POSTGRES_DB: gate_db
      POSTGRES_USER: gate_user
      POSTGRES_PASSWORD: gate_pass
    ports:
      - "5439:5432"
    volumes:
      - gate_pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: gate_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

  # TRACK 6: Redis session store — activate Spring profile 'redis' to use this.
  # AOF persistence ensures sessions survive container restarts.
  # Start only this service: docker compose up -d redis
  redis:
    image: redis:7-alpine
    container_name: gate_redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --loglevel notice
    ports:
      - "6379:6379"
    volumes:
      - gate_redis_data:/data
    restart: unless-stopped
    environment:
      # Expose host/port so the Spring app can read them if needed
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # MinIO — S3-compatible object storage for all extracted assets
  # Console UI: http://localhost:9001  (login: minioadmin / minioadmin)
  # API endpoint: http://localhost:9000
  minio:
    image: minio/minio:latest
    container_name: gate_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - gate_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # MinIO bucket initializer — creates the 'gate-assets' bucket on first run
  minio-init:
    image: minio/mc:latest
    container_name: gate_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/gate-assets;
        mc anonymous set download local/gate-assets;
        echo 'MinIO bucket gate-assets initialized.';
      "
    restart: "no"

  # Python FastAPI PDF Extraction Microservice
  # Handles Pipeline 1: document extraction using PyMuPDF + PaddleOCR
  # API: http://localhost:8090
  gate-extractor:
    build:
      context: ./extraction-service
      dockerfile: Dockerfile
    container_name: gate_extractor
    ports:
      - "8090:8090"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=gate-assets
    depends_on:
      - minio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  gate_pgdata:
  # Named volume for Redis AOF data — persists across container recreations
  gate_redis_data:
  # Named volume for MinIO object storage
  gate_minio_data:
